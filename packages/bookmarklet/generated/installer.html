    <main>
      <h1>LinkedIn Profile Exporter Bookmarklet</h1>
      <p>Drag the link to your bookmarks bar. Use the extension for the full robust export path.</p>
      <a href="javascript:(()%20%3D%3E%20%7B%0A%20%20const%20state%20%3D%20document.querySelector('%5Bdata-lpe-profile%5D%2C%20main')%3B%0A%20%20if%20(!%2Fhttps%3A%5C%2F%5C%2F(%5Ba-z%5D%7B2%2C3%7D%5C.)%3Fwww%5C.linkedin%5C.com%5C%2Fin%5C%2F%2Fi.test(location.href))%20%7B%0A%20%20%20%20alert('LinkedIn%20Profile%20Exporter%3A%20open%20a%20LinkedIn%20profile%20page%20first.')%3B%0A%20%20%20%20return%3B%0A%20%20%7D%0A%20%20if%20(!state)%20%7B%0A%20%20%20%20alert('LinkedIn%20Profile%20Exporter%3A%20accessible%20profile%20content%20was%20not%20found.%20Use%20the%20extension%20path.')%3B%0A%20%20%20%20return%3B%0A%20%20%7D%0A%20%20const%20name%20%3D%20document.querySelector('h1%2C%5Bdata-field%3D%22name%22%5D')%3F.textContent%3F.trim()%20%7C%7C%20'LinkedIn%20Profile'%3B%0A%20%20const%20payload%20%3D%20%7B%0A%20%20%20%20schemaVersion%3A%20'linkedin-profile-exporter.profile.v1'%2C%0A%20%20%20%20identity%3A%20%7B%20name%2C%20profileUrl%3A%20location.href%20%7D%2C%0A%20%20%20%20metadata%3A%20%7B%20capturedAt%3A%20new%20Date().toISOString()%2C%20sourceUrl%3A%20location.href%2C%20generator%3A%20'linkedin-profile-exporter-bookmarklet'%20%7D%2C%0A%20%20%20%20diagnostics%3A%20%5B%7B%20code%3A%20'bookmarklet.minimal'%2C%20level%3A%20'info'%2C%20message%3A%20'Bookmarklet%20fallback%20captured%20minimal%20profile%20data.%20Supported%20extension%20formats%3A%20json%2Cjson-resume%2Cyaml%2Ccsv%2Cxlsx%2Cxml%2Cmarkdown'%20%7D%5D%0A%20%20%7D%3B%0A%20%20const%20blob%20%3D%20new%20Blob(%5BJSON.stringify(payload%2C%20null%2C%202)%5D%2C%20%7B%20type%3A%20'application%2Fjson'%20%7D)%3B%0A%20%20const%20url%20%3D%20URL.createObjectURL(blob)%3B%0A%20%20const%20a%20%3D%20document.createElement('a')%3B%0A%20%20a.href%20%3D%20url%3B%0A%20%20a.download%20%3D%20name.toLowerCase().replace(%2F%5B%5Ea-z0-9%5D%2B%2Fg%2C%20'-')%20%2B%20'.linkedin-profile.json'%3B%0A%20%20a.click()%3B%0A%20%20setTimeout(()%20%3D%3E%20URL.revokeObjectURL(url)%2C%201000)%3B%0A%7D)()%3B">Export LinkedIn Profile</a>
    </main>
