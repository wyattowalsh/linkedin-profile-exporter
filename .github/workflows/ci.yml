name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm openspec
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm build:extension
      - run: pnpm check:manifests
      - run: pnpm test:e2e
      - run: git diff --check
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: linkedin-profile-exporter-artifacts
          path: |
            apps/extension/.output
            apps/docs/dist
            packages/bookmarklet/dist
            packages/bookmarklet/generated
            assets
